---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "22 8 * * 0"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read # CodeQL inspects workflow run metadata
      contents: read # checkout repository source
      packages: read # read GitHub Packages for the analysis action
      security-events: write # upload results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "javascript"]
    steps:
      - name: CodeQL Analysis
        uses: ivuorinen/actions/codeql-analysis@ac069ff8c0298d1c84dc73681cc6d7b58ec6184b # v2026.07.15
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
