---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "22 8 * * 0"
  merge_group:

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "javascript"]
    steps:
      - name: CodeQL Analysis
        uses: ivuorinen/actions/codeql-analysis@ac069ff8c0298d1c84dc73681cc6d7b58ec6184b # v2026.07.15
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
